<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISISCC Fantasy League Admin</title>
  <meta name="description" content="Admin command centre for ISISCC Fantasy Cricket.">
  <style>
    html, body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #e8f3ee 0, #f5f7fb 320px);
      color: #172033;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      text-align: center;
    }

    .handoff {
      width: min(440px, 100%);
      padding: 24px;
      border: 1px solid #dbe3ef;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
    }

    .eyebrow {
      color: #d97706;
      font-size: 0.75rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 8px;
      font-size: 1.55rem;
    }

    p {
      color: #64748b;
      line-height: 1.5;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 8px;
      padding: 9px 16px;
      border-radius: 8px;
      background: #0f766e;
      color: #ffffff;
      text-decoration: none;
      font-weight: 850;
    }
  </style>
</head>
<body>
  <main class="handoff">
    <div class="eyebrow">ISISCC Fantasy Cricket</div>
    <h1>Opening Admin...</h1>
    <p>If it does not open automatically, use the button below.</p>
    <a class="button" id="appLink" href="https://script.google.com/macros/s/AKfycbw0FMq7t-UtrI8SLlN3Na-DbHecvEMQenZU6T4nWdrQBuYr5YbAM2IKE6lIRDciFf_Vkg/exec?page=admin&authuser=0">Open Admin</a>
  </main>

  <script>
    const appUrl = 'https://script.google.com/macros/s/AKfycbw0FMq7t-UtrI8SLlN3Na-DbHecvEMQenZU6T4nWdrQBuYr5YbAM2IKE6lIRDciFf_Vkg/exec?page=admin&authuser=0';
    document.getElementById('appLink').href = appUrl;
    window.setTimeout(() => window.location.replace(appUrl), 80);
  </script>
</body>
</html>
