<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISISCC Auction Tool</title>
  <meta name="description" content="ISISCC Fantasy Cricket in-person auction spin wheel.">
  <style>
    :root {
      --topbar: 64px;
      --bg: #f5f7fb;
      --brand: #0f766e;
      --navy: #17324d;
      --gold: #d97706;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .topbar {
      min-height: var(--topbar);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px clamp(14px, 3vw, 28px);
      background: linear-gradient(135deg, var(--brand), var(--navy));
      color: #ffffff;
    }

    .eyebrow {
      display: block;
      color: #fcd58b;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.05rem, 2.2vw, 1.45rem);
    }

    .button {
      border: 1px solid var(--gold);
      border-radius: 8px;
      background: var(--gold);
      color: #201304;
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      text-decoration: none;
      font-weight: 800;
    }

    .frame-wrap {
      height: calc(100dvh - var(--topbar));
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }

    .loader {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #e8f3ee 0, #f5f7fb 320px);
      color: #64748b;
      text-align: center;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader strong {
      display: block;
      color: #172033;
      font-size: 1.05rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <span class="eyebrow">ISISCC Fantasy Cricket</span>
      <h1>Auction Tool</h1>
    </div>
    <a class="button" href="https://ravikirankella.github.io/Cricket/FL.html">Fantasy League</a>
  </header>

  <main class="frame-wrap">
    <iframe
      id="auctionToolFrame"
      title="ISISCC Auction Tool"
      src="https://script.google.com/macros/s/AKfycbw0FMq7t-UtrI8SLlN3Na-DbHecvEMQenZU6T4nWdrQBuYr5YbAM2IKE6lIRDciFf_Vkg/exec?page=auction"
      loading="eager"
      allowfullscreen>
    </iframe>

    <div class="loader" id="loader">
      <div>
        <strong>Loading Auction Tool...</strong>
        <span>Please wait while the spin wheel loads.</span>
      </div>
    </div>
  </main>

  <script>
    const loader = document.getElementById('loader');
    document.getElementById('auctionToolFrame').addEventListener('load', () => {
      loader.classList.add('hidden');
    });
  </script>
</body>
</html>
