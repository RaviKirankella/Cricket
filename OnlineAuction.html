    <script>
(function () {
  const API_BASE_URL = 'https://isiscc-fantasy-api.ravikiran59.workers.dev';

  const routes = {
    getRegistrationState: '/api/registration/state',
    requestPasswordReset: '/api/password/reset',
    addUser: '/api/users/add',
    loginUser: '/api/auth/login',
    getUsers: '/api/users/list',
    getPlayers: '/api/players/list',
    getAuctionList: '/api/auction/list',
    getAuctionRow: '/api/auction/row',
    updateAuctionBid: '/api/auction/update-bid',
    addAcutionRow: '/api/auction-tool/add-row',
    loginScoreboard: '/api/scoreboard/login',
    checkgameidexistsDetailed: '/api/scorecard/check',
    addRows: '/api/admin/scorecard/save',
    upsertrows: '/api/admin/scorecard/save',
    loginAdmin: '/api/admin/login',
    getAdminSnapshot: '/api/admin/snapshot',
    adminPreviewSeasonSheets: '/api/admin/season-sheets/preview',
    adminEnsureSeasonSheets: '/api/admin/season-sheets/apply',
    adminPreviewFutureFixtures: '/api/admin/fixtures/preview',
    adminApplyFutureFixtures: '/api/admin/fixtures/apply',
    adminPreviewScorecardPlayers: '/api/admin/players/preview',
    adminApplyScorecardPlayers: '/api/admin/players/apply',
    adminPreviewRegistrationState: '/api/admin/registration/preview',
    adminApplyRegistrationState: '/api/admin/registration/apply',
    adminListNewScorecards: '/api/admin/scorecards',
    adminGetPredictionControls: '/api/admin/prediction-controls',
    adminUpdatePredictionControls: '/api/admin/prediction-controls/update',
    adminPreviewBettingOddsAdjustments: '/api/admin/odds-adjustments/preview',
    adminApplyBettingOddsAdjustments: '/api/admin/odds-adjustments/apply',
    adminPreviewScorecardImport: '/api/admin/scorecard/preview',
    adminSaveScorecardRows: '/api/admin/scorecard/save'
  };

  async function postApi(route, payload) {
    const response = await fetch(API_BASE_URL + route, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload || {})
    });
    const envelope = await response.json().catch(() => null);
    if (!response.ok || !envelope || envelope.ok === false) {
      const message = envelope && envelope.error && envelope.error.message
        ? envelope.error.message
        : 'Cloudflare API returned HTTP ' + response.status;
      throw new Error(message);
    }
    return envelope.data;
  }

  function buildPayload(method, args) {
    if (method === 'requestPasswordReset') return { email: args[0] };
    if (method === 'addUser') return { username: args[0], password: args[1], email: args[2] };
    if (method === 'loginUser') return { username: args[0], team: args[0], password: args[1] };
    if (method === 'getAuctionList') return addFantasyCredentials({ sheetName: args[0] });
    if (method === 'getAuctionRow') return addFantasyCredentials({ sheetName: args[0], nomination: args[1] });
    if (method === 'updateAuctionBid') {
      return addFantasyCredentials({
        sheetName: args[0],
        nomination: args[1],
        newBid: args[2],
        bidHolder: args[3],
        username: args[3],
        team: args[3]
      });
    }
    if (method === 'addAcutionRow') return { sheetName: args[0], row: args[1], data: args[1] };
    if (method === 'loginScoreboard') return args[0] || {};
    if (method === 'checkgameidexistsDetailed') {
      return addScoreboardCredentials({ sheetName: args[0], gameId: args[1] });
    }
    if (method === 'addRows' || method === 'upsertrows') {
      return addScoreboardCredentials({ sheetName: args[0], rows: args[1], data: args[1] });
    }
    if (method === 'loginAdmin') return args[0] || {};
    if (method.indexOf('admin') === 0 || method === 'getAdminSnapshot') return args[0] || {};
    return {};
  }

  function unwrap(method, data, payload) {
    if (method === 'requestPasswordReset') return data && data.message ? data.message : data;
    if (method === 'addUser') return data && data.message ? data.message : data;
    if (method === 'loginUser') {
      if (data && data.ok) {
        window.__fantasyCredentials = {
          team: payload.team || payload.username,
          username: payload.username || payload.team,
          password: payload.password
        };
      }
      return !!(data && data.ok);
    }
    if (method === 'getUsers') return data && data.users ? data.users : [];
    if (method === 'getPlayers') return data && data.players ? data.players : [];
    if (method === 'getAuctionList') return data && data.rows ? data.rows : [];
    if (method === 'getAuctionRow') return data ? data.row : null;
    if (method === 'updateAuctionBid') return data && (data.result || data.message) ? (data.result || data.message) : data;
    if (method === 'addAcutionRow') return data && (data.result || data.message) ? (data.result || data.message) : data;
    if (method === 'loginScoreboard') {
      if (data && data.ok) {
        window.__scoreboardCredentials = {
          name: payload.name || payload.username,
          key: payload.key || payload.password
        };
      }
      return data;
    }
    if (method === 'addRows' || method === 'upsertrows') return data && data.message ? data.message : data;
    return data;
  }

  function addFantasyCredentials(payload) {
    const creds = window.__fantasyCredentials || {};
    return Object.assign({}, payload, {
      username: payload.username || creds.username || creds.team,
      team: payload.team || creds.team || creds.username,
      password: payload.password || creds.password
    });
  }

  function addScoreboardCredentials(payload) {
    return Object.assign({}, window.__scoreboardCredentials || {}, payload);
  }

  function makeRunner(successHandler, failureHandler) {
    const runner = {
      withSuccessHandler(fn) {
        return makeRunner(fn, failureHandler);
      },
      withFailureHandler(fn) {
        return makeRunner(successHandler, fn);
      }
    };

    return new Proxy(runner, {
      get(target, property) {
        if (property in target) return target[property];
        const method = String(property);
        return function () {
          const args = Array.prototype.slice.call(arguments);
          const route = routes[method];
          if (!route) {
            const err = new Error('Unsupported Apps Script call through Cloudflare: ' + method);
            if (failureHandler) {
              failureHandler(err);
              return undefined;
            }
            throw err;
          }
          const payload = buildPayload(method, args);
          postApi(route, payload)
            .then(data => {
              if (successHandler) successHandler(unwrap(method, data, payload));
            })
            .catch(error => {
              if (failureHandler) {
                failureHandler(error);
              } else {
                setTimeout(() => { throw error; }, 0);
              }
            });
          return undefined;
        };
      }
    });
  }

  window.flApiPost = postApi;
  window.google = window.google || {};
  window.google.script = window.google.script || {};
  window.google.script.run = makeRunner(null, null);
})();

  <script>
var username="";
var password="";

loadRegistrationState();

function londonYear() {
  try {
    return Number(new Intl.DateTimeFormat('en-GB', { timeZone: 'Europe/London', year: 'numeric' }).format(new Date()));
  } catch (err) {
    return new Date().getFullYear();
  }
}

function showRegister() {
if (document.getElementById('registrationButton').disabled) return;
document.getElementById('logincontainer').style.display = 'none';
document.getElementById('registercontainer').style.display = 'block';
}

function showLogin() {
document.getElementById('registercontainer').style.display = 'none';

}

function showForgot() {
  document.getElementById("logincontainer").style.display = "none";
  document.getElementById("registercontainer").style.display = "none";

}

function loadRegistrationState() {
  if (typeof google === 'undefined' || !google.script || !google.script.run) return;
  google.script.run
    .withSuccessHandler(applyRegistrationState)
    .withFailureHandler(function() {
      applyRegistrationState({ open: false, message: 'Registration is currently closed.' });
    })
    .getRegistrationState();
}

function applyRegistrationState(state) {
  var status = state || {};
  var isOpen = status.open === true || String(status.status || '').toUpperCase() === 'OPEN';
  var statusNode = document.getElementById('registrationStatus');
  var button = document.getElementById('registrationButton');
  statusNode.innerText = isOpen ? 'Registration is open.' : 'Registration is currently closed.';
  button.disabled = !isOpen;
  button.innerText = isOpen ? 'Register' : 'Registration Closed';
  button.classList.toggle('secondary', !isOpen);
}

function loginAction(response) {
    console.log(response);
    if (response=== true) { // Use parentheses () and curly braces {}
        document.getElementById('lrcontainer').style.display = 'none';
        document.getElementById('updateslink').style.display = 'block';
        document.getElementById('auctioncontainer').style.display = 'block';

        var username = document.getElementById("loginUsername").value;
        var password = document.getElementById("loginPassword").value;

        if (rememberMe) {
            setCookie("username", username, 2); // Store for 2 days
            setCookie("password", password, 2);
        } else {

            setCookie("password", "", -1);

    } else {
        document.getElementById("loginMessage").innerText = "Invalid user! Please register!";
        deleteCookie("username");

    }
}

  // Function to set a cookie (name, value, expiration in days)
  function setCookie(name, value, days) {
      var expires = "";
      if (days) {
          var date = new Date();
          date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000)); // Convert days to milliseconds
          expires = "; expires=" + date.toUTCString();
      }
      document.cookie = name + "=" + value + expires + "; path=/";
  }

  // Function to get a cookie by name
  function getCookie(name) {
      var nameEQ = name + "=";
      var cookies = document.cookie.split(';');
      for (var i = 0; i < cookies.length; i++) {
          var c = cookies[i].trim();
          if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
      }
      return null;
  }

  function deleteCookie(name) {
    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
}

          });
        })
        .getUsers();
    }

    function loadAuctions() {
      google.script.run.withSuccessHandler(displayAuctions).withFailureHandler(handleError).getAuctionList(auctionsheetname);
    }

    function handleError(error) {
  console.log("Error fetching auction data:", error);
}

function displayAuctions(values) {
    var data = values;
    var totalspend=0;
    var newspend=0;

    console.log("starting displayAuctions");
    var container = document.getElementById("auctioncontainer");
    container.innerHTML = ""; // Clear previous content

    // 🔹 Add Search Box & Clear Button
    var searchDiv = document.createElement("div");
    searchDiv.classList.add("search-container");

    var searchInput = document.createElement("input");
    searchInput.type = "text";
    searchInput.id = "searchBox";
    searchInput.placeholder = "Search player nominations...";
    searchInput.onkeyup = filterAuctions; // Attach search function

    var clearButton = document.createElement("button");
    clearButton.id = "filterButton"; // Assign an ID
    clearButton.classList.add("whitebutton");
    clearButton.textContent = "My Bids";
    clearButton.onclick = filterMyBids;
    //clearButton.textContent = "Clear";
    //clearButton.onclick = clearFilter; // Attach clear function

    var clearButton2 = document.createElement("button");
    clearButton2.id = "filterButton2"; // Assign an ID
    clearButton2.classList.add("whitebutton");
    clearButton2.textContent = "Active Bids";
    clearButton2.onclick = filterMyBids2;
    //clearButton.textContent = "Clear";
    //clearButton.onclick = clearFilter; // Attach clear function

    var totalDiv = document.createElement("div");
    totalDiv.style.textAlign = "right";

    // Create heading element
    var heading = document.createElement("h3");

    // Create text element
    var text = document.createElement("a");
    text.textContent = "Total spend so far (max: 100,000): ";

    // Create total spend element
    var totalSpend = document.createElement("a");
    totalSpend.id = "totalspend";
    totalSpend.textContent = "0";

    // Create refresh button
    var refreshButton = document.createElement("button");
    refreshButton.classList.add("refreshbutton");
    refreshButton.textContent = "Refresh";
    refreshButton.onclick = loadAuctions; // Assign function reference

    // Append elements to heading
    heading.appendChild(text);
    heading.appendChild(totalSpend);
    heading.appendChild(refreshButton);

    // Append heading to totalDiv
    totalDiv.appendChild(heading);

    searchDiv.appendChild(searchInput);
    searchDiv.appendChild(clearButton);
    searchDiv.appendChild(clearButton2);
    container.appendChild(searchDiv); // 🔹 Append search elements to container
    container.appendChild(totalDiv)


    if (data.length < 2) return; // No data rows

    data.shift(); // Remove header row
    var today = new Date();

    data.forEach(function (row) {
        var nomination = row[0]; // Nomination column
        var startDate = new Date(row[3]); // StartDate column
        var endDate = new Date(row[4]); // StartDate column
        endDate.setHours(23, 0, 0, 0); // Set time to 11:00 PM
        var basePrice = parseInt(row[5]); // Base Price
        var currentBid = row[7] === "NA" ? null : parseInt(row[6]); // Current Bid
        var bidHolder = row[7] === "NA" ? "No bids yet" : row[7]; // Bid Holder

        var rowDiv = document.createElement("div");
        rowDiv.classList.add("auction-item");
        rowDiv.id = nomination;
        rowDiv.style.marginBottom = "10px";

        var nominationSpan = document.createElement("span");
        nominationSpan.textContent = nomination + " ";

        // Create a span element to display the end time
        var endTimeSpan = document.createElement("span");
        endTimeSpan.classList.add("end-time");
        endTimeSpan.style.marginLeft = "10px";
        endTimeSpan.style.fontSize = "12px";
        endTimeSpan.style.color = "#888"; // Gray color

        var now = new Date(); // Current date and time
        var button = document.createElement("button");
        if (now > endDate) {
            if (currentBid === null) {
                // Auction ended with no bids, mark as "Unsold"
                button.innerHTML = `Unsold <br><a class="subtext">Base Price: ${basePrice}</a>`;
                button.classList.add("unsold");
            } else {
                // Auction ended, show "Sold"
                button.innerHTML = `Sold <br><a class="subtext">Final Bid: ${currentBid} by ${bidHolder}</a>`;
                button.classList.add("sold");
            }
            button.disabled = true; // Disable button
            endTimeSpan.textContent = "Auction Ended";
        } else if (startDate > now) {
            // Auction upcoming
            button.innerHTML = `Upcoming <br><a class="subtext">${startDate.toDateString()}</a>`;
            button.classList.add("upcoming");
            button.disabled = true;
            //endTimeSpan.textContent = `Starts: ${startDate.toDateString()}`;
            endTimeSpan.textContent = `Ends: ${endDate.toDateString()} 11:00 PM`;
        } else {
            // Auction ongoing
            var pricetext = currentBid === null
                ? `Bid Now  <br><a class="subtext">Base Price: ${basePrice}</a>`
                : `Bid Now  <br><a class="subtext">Current Bid: ${currentBid} by ${bidHolder}</a>`;

            button.innerHTML = pricetext;
            button.classList.add("bidnow");
            button.disabled = false;
            endTimeSpan.textContent = `Ends: ${endDate.toDateString()} 11:00 PM`;
        }

        if (currentBid !== null && bidHolder === username) {
            totalspend += currentBid;
        }        

        // Create bidding UI (initially hidden)
        var bidDiv = document.createElement("div");
        bidDiv.style.display = "none";
        bidDiv.classList.add("bid-container");

        // Text element for current bid value
        var bidText = document.createElement("a");
        bidText.classList.add("bid-text");
        bidText.innerHTML = currentBid === null
            ? `Current Bid: <strong>${basePrice}</strong> (Starting Price)`
            : `Current Bid: <strong>${currentBid}</strong> by <strong>${bidHolder}</strong>`;

        // Button to increment bid
        var incrementButton = document.createElement("button");
        incrementButton.classList.add("whitebutton");
        incrementButton.textContent = "+ 500";

        // Disable increment if current user is bid holder
        if (bidHolder === username) {

            incrementButton.disabled = true;
        }

        // Submit button (Initially Disabled)
        var submitButton = document.createElement("button");
        submitButton.classList.add("bidnow");
        submitButton.textContent = "Submit";
        submitButton.disabled = true; // Disabled initially

        // Increment Button Functionality
        incrementButton.onclick = function () {
            var newBid = (currentBid ? currentBid : basePrice) + 500;
            bidText.innerHTML = `Current Bid: <strong>${newBid}</strong> (Your Bid)`;
            currentBid = newBid; // Update bid value

            submitButton.disabled = false; // Enable submit button after incrementing bid
            
            //var totalSpendElement = document.getElementById("totalspend");
            //var totalSpend = parseInt(totalSpendElement.textContent) || 0;
            //totalSpend += 500; // Increment total spend
            //totalSpendElement.textContent = totalSpend; // Update UI
        };

        // Submit button function
        submitButton.onclick = function () {
            document.body.style.cursor = "wait";
            setTimeout(() => { 
                // Simulate processing
                document.body.style.cursor = "default"; // Reset cursor after action
            }, 3000);            
            google.script.run
                .withSuccessHandler(function (response) {
                    document.body.style.cursor = "default";
                    var totalSpendElement = document.getElementById("totalspend");
                    var totalSpend = parseInt(totalSpendElement.textContent) || 0;
                    totalSpend += currentBid; // Increment total spend
                    totalSpendElement.textContent = totalSpend; // Update UI
                    if (response === "Success") {
                        refreshSingleAuction(nomination); // Refresh bid info after update
                        alert(`Bid submitted successfully: ${currentBid} for ${nomination}`);
                        submitButton.disabled = true; // Disable submit after bid submission
                        incrementButton.disabled = true; // Disable increment after bid submission
                    } else {
                        alert(`Error: ${response}`);
                    }
                })
                .withFailureHandler(function (error) {
                    document.body.style.cursor = "default";
                    alert("Failed to submit bid: " + error.message);
                    refreshSingleAuction(nomination); // Refresh bid info after update
                    
                })
                .updateAuctionBid(auctionsheetname, nomination, currentBid, username); // Pass current username
        };

        // Close button
        var closeButton = document.createElement("button");
        closeButton.classList.add("upcoming");
        closeButton.textContent = "Close";
        closeButton.onclick = function () {
            bidDiv.style.display = bidDiv.style.display === "block" ? "none" : "block";
        };

        // Refresh button
        var refreshButton = document.createElement("button");
        refreshButton.classList.add("whitebutton");
        refreshButton.textContent = "Refresh";
        refreshButton.onclick = function () {
            refreshSingleAuction(nomination); // Fetch latest bid for this auction item
        };

        // Toggle bid UI on button click
        button.onclick = function () {
            bidDiv.style.display = bidDiv.style.display === "none" ? "block" : "none";
        };

        bidDiv.appendChild(bidText);
        bidDiv.appendChild(incrementButton);
        bidDiv.appendChild(submitButton);
        bidDiv.appendChild(closeButton);
        bidDiv.appendChild(refreshButton);

        rowDiv.appendChild(nominationSpan);
        rowDiv.appendChild(button);
        rowDiv.appendChild(endTimeSpan); 
        rowDiv.appendChild(bidDiv);
        container.appendChild(rowDiv);
    });

    var totalSpendElement = document.getElementById("totalspend");
    if (totalSpendElement) {
        totalSpendElement.textContent = totalspend; // Update value
    }
}


function refreshSingleAuction(nomination) {
    google.script.run
        .withSuccessHandler(function (row) {
            if (row) updateSingleBidValue(nomination, row);
        })
        .withFailureHandler(handleError)
        .getAuctionRow(auctionsheetname, nomination);
}

function updateSingleBidValue(nomination, row) {
    if (!row) return; // No data received

    var newBid = (row[6] === "NA" || row[6] === 0) ? null : parseInt(row[6]); // Latest Current Bid
    var newBidHolder = row[7] === "NA" ? "No bids yet" : row[7]; // Latest Bid Holder

    var auctionItem = document.getElementById(nomination);
    if (auctionItem) {
        var bidText = auctionItem.querySelector(".bid-text");
        //console.log(bidText);
        if (bidText) {
            bidText.innerHTML = newBid === null
                ? `Current Bid: <strong>${parseInt(row[5])}</strong> (Starting Price)`
                : `Current Bid: <strong>${newBid}</strong> by <strong>${newBidHolder}</strong>`;
        }
    }
}

function filterAuctions() {
    var input, filter, container, auctionItems, nominationText, i;
    
    input = document.getElementById("searchBox");
    filter = input.value.toLowerCase(); // Convert input to lowercase
    container = document.getElementById("auctioncontainer");
    auctionItems = container.getElementsByClassName("auction-item"); // Get all auction items

    for (i = 0; i < auctionItems.length; i++) {
        nominationText = auctionItems[i].getElementsByTagName("span")[0].textContent.toLowerCase();
        
        // Show item if it contains the search text, otherwise hide it
        if (nominationText.includes(filter)) {
            auctionItems[i].style.display = "";
        } else {
            auctionItems[i].style.display = "none";
        }
    }
}

function filterMyBids() {
    var container = document.getElementById("auctioncontainer");
    var auctionItems = container.getElementsByClassName("auction-item");

    for (var i = 0; i < auctionItems.length; i++) {
        var bidText = auctionItems[i].getElementsByClassName("subtext")[0].textContent.toLowerCase();
        
        if (bidText.includes(username.toLowerCase())) {
            auctionItems[i].style.display = "";
        } else {
            auctionItems[i].style.display = "none";
        }
    }

    // Update button using its ID
    var btn = document.getElementById("filterButton");
    btn.textContent = "Clear";
    btn.onclick = clearFilter;
}

function filterMyBids2() {
    var container = document.getElementById("auctioncontainer");
    var auctionItems = container.getElementsByClassName("auction-item");

    for (var i = 0; i < auctionItems.length; i++) {
        var button = auctionItems[i].getElementsByTagName("button")[0];
        var buttonText = button.textContent.toLowerCase();
        
        if (buttonText.includes("unsold")) {
            
        } else if (buttonText.includes("bid now")) {
          auctionItems[i].style.display = "";
        }
        else {
            auctionItems[i].style.display = "none";
        }
    }

    // Update button using its ID
    var btn = document.getElementById("filterButton2");
    btn.textContent = "Clear";
    btn.onclick = clearFilter;
}




function clearFilter() {
    var auctionItems = document.getElementsByClassName("auction-item");

    for (var i = 0; i < auctionItems.length; i++) {
        auctionItems[i].style.display = "";
    }

    // Reset button using its ID
    var btn = document.getElementById("filterButton");
    btn.textContent = "My Bids";
    btn.onclick = filterMyBids;
    
    var btn = document.getElementById("filterButton2");
    btn.textContent = "Active Bids";
    btn.onclick = filterMyBids2;    
}

window.onload = function () {
    var savedUsername = getCookie("username");

    if (savedUsername && savedPassword) {
        document.getElementById("loginUsername").value = savedUsername;
        document.getElementById("loginPassword").value = savedPassword;
        document.getElementById("rememberMe").checked = true;
        
        // Auto login if credentials exist
        loginUser();  
    }
};
