<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISISCC Fantasy Predictions</title>
  <meta name="description" content="Make ISISCC Fantasy Cricket predictions for open fixtures.">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #f6f8f5;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }

    .loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #edf4ef 0, #f6f8f5 320px);
      color: #5d6b62;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      text-align: center;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader strong {
      display: block;
      color: #17211c;
      font-size: 1.05rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <iframe
    id="predictionFrame"
    title="ISISCC Fantasy Predictions"
    src="https://script.google.com/macros/s/AKfycbw0FMq7t-UtrI8SLlN3Na-DbHecvEMQenZU6T4nWdrQBuYr5YbAM2IKE6lIRDciFf_Vkg/exec?page=prediction"
    loading="eager"
    allowfullscreen>
  </iframe>

  <div class="loader" id="loader">
    <div>
      <strong>Loading Fantasy Predictions...</strong>
      <span>Please wait while Make Prediction loads.</span>
    </div>
  </div>

  <script>
    const loader = document.getElementById('loader');
    document.getElementById('predictionFrame').addEventListener('load', () => {
      loader.classList.add('hidden');
    });
  </script>
</body>
</html>
