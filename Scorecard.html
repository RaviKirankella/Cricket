<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISISCC Add Scorecard</title>
  <meta name="description" content="Add or amend ISISCC Fantasy Cricket scorecards.">
  <style>
    html, body { height: 100%; margin: 0; }
    body { overflow: hidden; background: #f5f7fb; }
    iframe { width: 100%; height: 100%; border: 0; display: block; background: #ffffff; }
    .loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #e8f3ee 0, #f5f7fb 320px);
      color: #64748b;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      text-align: center;
      transition: opacity 180ms ease, visibility 180ms ease;
    }
    .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader strong { display: block; color: #172033; font-size: 1.05rem; margin-bottom: 8px; }
    .direct-help {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid rgba(15, 118, 110, 0.45);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #0f766e;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
    }
  </style>
</head>
<body>
  <iframe id="appFrame" title="ISISCC Add Scorecard" src="https://script.google.com/macros/s/AKfycbw0FMq7t-UtrI8SLlN3Na-DbHecvEMQenZU6T4nWdrQBuYr5YbAM2IKE6lIRDciFf_Vkg/exec?page=score&authuser=0" loading="eager" allowfullscreen></iframe>
  <div class="loader" id="loader"><div><strong>Loading Add Scorecard...</strong><span>Please wait while the scorecard page loads.</span></div></div>
  <a class="direct-help" href="https://script.google.com/macros/s/AKfycbw0FMq7t-UtrI8SLlN3Na-DbHecvEMQenZU6T4nWdrQBuYr5YbAM2IKE6lIRDciFf_Vkg/exec?page=score&authuser=0" target="_top">Open direct</a>
  <script>
    const loader = document.getElementById('loader');
    document.getElementById('appFrame').addEventListener('load', () => loader.classList.add('hidden'));
  </script>
</body>
</html>
