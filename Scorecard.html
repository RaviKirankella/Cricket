<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISISCC Add Scorecard</title>
  <meta name="description" content="Add or amend ISISCC Fantasy Cricket scorecards.">
  <style>
    :root {
      --bg: #f5f7fb;
      --bg-accent: #e8f3ee;
      --ink: #172033;
      --muted: #64748b;
      --brand: #0f766e;
      --navy: #17324d;
      --gold: #d97706;
      --line: #dbe3ef;
      --surface: rgba(255, 255, 255, 0.92);
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.14);
      --topbar: 68px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.18), rgba(217, 119, 6, 0.08) 38%, rgba(23, 50, 77, 0.10)),
        linear-gradient(180deg, var(--bg-accent), var(--bg));
      color: var(--ink);
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    .topbar {
      min-height: var(--topbar);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px clamp(14px, 3vw, 28px);
      background: linear-gradient(135deg, var(--brand) 0%, var(--navy) 100%);
      color: #ffffff;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 2;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      display: block;
      color: #fcd58b;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.05rem, 2.2vw, 1.45rem);
      line-height: 1.1;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.40);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 12px;
      font: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
      white-space: nowrap;
    }

    .button:hover,
    .button:focus-visible {
      background: rgba(255, 255, 255, 0.24);
      border-color: rgba(255, 255, 255, 0.70);
      transform: translateY(-1px);
      outline: none;
    }

    .button.primary {
      background: var(--gold);
      border-color: var(--gold);
      color: #201304;
    }

    .frame-wrap {
      height: calc(100dvh - var(--topbar));
      min-height: 280px;
      position: relative;
      padding: 10px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.10);
      display: block;
    }

    .loader {
      position: absolute;
      inset: 10px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--surface);
      color: var(--muted);
      text-align: center;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      max-width: 520px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.10);
    }

    .loader-card strong {
      display: block;
      color: var(--ink);
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .loader-card p {
      margin: 0 0 14px;
      line-height: 1.45;
    }

    @media (max-width: 680px) {
      :root {
        --topbar: 98px;
      }

      body {
        overflow: auto;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        white-space: normal;
      }

      .actions {
        width: 100%;
        justify-content: flex-start;
      }

      .button {
        flex: 1 1 auto;
      }

      .frame-wrap {
        height: calc(100dvh - var(--topbar));
        padding: 8px;
      }

      iframe,
      .loader {
        border-radius: 6px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="eyebrow">ISISCC Fantasy Cricket</span>
      <h1>Add Scorecard</h1>
    </div>
    <nav class="actions" aria-label="Scorecard links">
      <a class="button primary" href="https://ravikirankella.github.io/Cricket/FL.html">Fantasy League</a>
    </nav>
  </header>

  <main class="frame-wrap">
    <iframe
      id="scorecardFrame"
      title="ISISCC Add Scorecard"
      src="https://script.google.com/macros/s/AKfycbw0FMq7t-UtrI8SLlN3Na-DbHecvEMQenZU6T4nWdrQBuYr5YbAM2IKE6lIRDciFf_Vkg/exec?page=score"
      loading="eager"
      allowfullscreen>
    </iframe>

    <div class="loader" id="loader">
      <div class="loader-card">
        <strong>Loading Add Scorecard...</strong>
        <p>The scorecard page will appear here.</p>
      </div>
    </div>
  </main>

  <script>
    const loader = document.getElementById('loader');
    const frame = document.getElementById('scorecardFrame');

    frame.addEventListener('load', () => {
      loader.classList.add('hidden');
    });

    window.setTimeout(() => {
      if (!loader.classList.contains('hidden')) {
        loader.querySelector('p').textContent =
          'This is taking longer than expected. Refresh the page and try again.';
      }
    }, 9000);
  </script>
</body>
</html>
